# config/config.yaml

data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  
  dim_files:
    location: "dim_location.csv"
    property_type: "dim_property_type.csv"
    time: "dim_time.csv"
    transaction_type: "dim_transaction_type.csv"
  
  fact_file: "fact_properties.csv"

database:
  type: "postgresql"
  host: "localhost"
  port: 5432
  username: "postgres"
  password: "123456"
  database: "datn_real_estate"
  schema: "public"

data_quality:
  missing_threshold: 50
  outlier_method: "iqr"
  outlier_threshold: 1.5
  remove_duplicates: true
  
  numeric_columns:
    - "area"
    - "price_milli"
    - "bedrooms"
    - "bathrooms_num"

logging:
  level: "INFO"
  file: "logs/etl.log"